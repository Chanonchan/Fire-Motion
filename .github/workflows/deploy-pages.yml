name: Deploy to GitHub Pages

# Publishes main to the gh-pages branch, which GitHub Pages serves.
# (The gh-pages branch is used because creating it auto-enables Pages,
# while the "GitHub Actions" Pages source needs a manual settings step.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push main to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push --force origin HEAD:gh-pages
